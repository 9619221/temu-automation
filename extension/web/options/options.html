<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Temu 多店监控 · 设置</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card: rgba(255,255,255,0.82);
      --card-border: rgba(0,0,0,0.04);
      --text-primary: #1d1d1f;
      --text-secondary: #86868b;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --green: #34c759;
      --red: #ff3b30;
      --separator: rgba(0,0,0,0.06);
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      max-width: 560px; margin: 48px auto; padding: 0 24px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", system-ui, sans-serif;
      color: var(--text-primary); background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; line-height: 1.5; }

    .card {
      background: var(--card);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius); margin-bottom: 20px; overflow: hidden;
      box-shadow: 0 0.5px 1px rgba(0,0,0,0.03), 0 4px 12px rgba(0,0,0,0.04);
    }

    .field {
      padding: 14px 20px; border-bottom: 0.5px solid var(--separator);
    }
    .field:last-child { border-bottom: none; }
    .field label {
      display: block; font-size: 11px; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 8px;
    }
    .input-wrap { position: relative; }
    input {
      width: 100%; padding: 11px 14px; border: 1px solid var(--separator); border-radius: 10px;
      font-size: 14px; font-family: inherit; background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.1); }
    input[readonly] { background: var(--bg); color: var(--text-secondary); }
    .hint { font-size: 11px; color: var(--text-secondary); margin-top: 6px; line-height: 1.4; }
    code { background: rgba(0,0,0,0.04); padding: 2px 6px; border-radius: 4px; font-size: 11px; }

    .toggle-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 16px;
      color: var(--text-secondary); padding: 4px; border-radius: 6px;
      transition: background 0.15s;
    }
    .toggle-btn:hover { background: rgba(0,0,0,0.05); }

    .btn-row { display: flex; gap: 10px; padding: 20px 0 0; }
    .btn {
      padding: 11px 22px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .btn:active { transform: scale(0.97); }
    .btn-filled { background: var(--accent); color: #fff; }
    .btn-filled:hover { background: var(--accent-hover); }
    .btn-secondary { background: rgba(0,0,0,0.04); color: var(--text-primary); }
    .btn-secondary:hover { background: rgba(0,0,0,0.08); }
    .btn-danger { background: rgba(255,59,48,0.08); color: var(--red); }
    .btn-danger:hover { background: rgba(255,59,48,0.14); }

    .banner {
      margin-top: 14px; padding: 12px 16px; border-radius: 10px;
      font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.3s;
    }
    .banner.show { opacity: 1; }
    .banner.ok { background: rgba(52,199,89,0.1); color: #1b7d36; }
    .banner.err { background: rgba(255,59,48,0.1); color: var(--red); }

    .info-card {
      background: rgba(0,113,227,0.05); border: 1px solid rgba(0,113,227,0.1);
      border-radius: var(--radius); padding: 14px 18px; font-size: 12px;
      color: var(--text-secondary); line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>设置</h1>
  <p class="subtitle">配置云端连接以启用多店数据采集与同步。</p>

  <div class="card">
    <div class="field">
      <label>服务地址</label>
      <input type="text" id="cloud_endpoint" value="https://erp.temu.chat/cloud" readonly />
      <div class="hint">数据将上报至 <code>/api/ingest/v1/batch</code></div>
    </div>
    <div class="field">
      <label>访问令牌</label>
      <div class="input-wrap">
        <input type="password" id="auth_token" placeholder="eyJ..." />
        <button class="toggle-btn" id="toggleToken" title="显示/隐藏">👁</button>
      </div>
    </div>
    <div class="field">
      <label>设备标识</label>
      <input type="text" id="device_id" readonly />
      <div class="hint">自动生成，用于云端识别设备</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-filled" id="save">保存</button>
    <button class="btn btn-secondary" id="test">测试连接</button>
    <button class="btn btn-danger" id="purge">清空队列</button>
  </div>
  <div class="banner" id="banner"></div>

  <div style="margin-top: 28px;">
    <div class="info-card">
      白名单覆盖 221 个接口。反爬埋点路径（phantom / pftk / thtk）已在黑名单中排除。
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
