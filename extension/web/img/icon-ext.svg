<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1f4e"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 圆形背景 -->
  <circle cx="64" cy="64" r="64" fill="url(#bg)"/>

  <!-- 微妙光晕 -->
  <ellipse cx="64" cy="54" rx="44" ry="28" fill="#6366f1" opacity="0.08"/>

  <!-- T 发光底层 -->
  <g opacity="0.35" filter="url(#glow)">
    <rect x="24" y="30" width="80" height="14" rx="7" fill="url(#bar)"/>
    <rect x="54" y="38" width="20" height="60" rx="10" fill="url(#stem)"/>
  </g>

  <!-- T 横杠 -->
  <rect x="24" y="30" width="80" height="14" rx="7" fill="url(#bar)"/>

  <!-- T 竖杠 -->
  <rect x="54" y="38" width="20" height="60" rx="10" fill="url(#stem)"/>

  <!-- 交接高光 -->
  <rect x="54" y="37" width="20" height="9" rx="2" fill="#818cf8" opacity="0.45"/>

  <!-- 右下数据柱 -->
  <rect x="86" y="80" width="5" height="14" rx="2.5" fill="url(#accent)" opacity="0.7"/>
  <rect x="93" y="74" width="5" height="20" rx="2.5" fill="url(#accent)" opacity="0.85"/>
  <rect x="100" y="66" width="5" height="28" rx="2.5" fill="url(#accent)"/>

  <!-- 高光点 -->
  <circle cx="35" cy="37" r="2" fill="white" opacity="0.75"/>
  <circle cx="93" cy="37" r="2" fill="white" opacity="0.45"/>
</svg>
