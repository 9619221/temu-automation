<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>采集助手</title>
  <style>
    body { width: 340px; margin: 0; padding: 14px; font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 13px; color: #1f2328; }
    h1 { font-size: 14px; font-weight: 600; margin: 0 0 12px; }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 6px 0; border-bottom: 1px solid #eef0f3; }
    .row:last-child { border-bottom: none; }
    .label { color: #57606a; }
    .value { font-weight: 500; max-width: 190px; text-align: right; word-break: break-word; }
    .ok { color: #1a7f37; }
    .err { color: #cf222e; }
    button { margin-top: 10px; width: 100%; padding: 8px; border: 1px solid #d0d7de; background: #f6f8fa; border-radius: 6px; cursor: pointer; font-size: 13px; }
    button:hover { background: #eaeef2; }
    button.primary { background: #0969da; color: white; border-color: #0969da; }
    button.primary:hover { background: #0860ca; }
    .footer { margin-top: 10px; color: #8c959f; font-size: 11px; text-align: center; }
    .footer a { color: #0969da; text-decoration: none; cursor: pointer; }
    .hint { margin-top: 10px; padding: 8px; border-radius: 6px; background: #fff8c5; color: #57606a; font-size: 12px; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>浏览器采集助手</h1>
  <div class="row"><span class="label">配置状态</span><span class="value" id="cfg">-</span></div>
  <div class="row"><span class="label">已捕获接口</span><span class="value" id="captured">-</span></div>
  <div class="row"><span class="label">已上报</span><span class="value" id="sent">-</span></div>
  <div class="row"><span class="label">待上报</span><span class="value" id="queue">-</span></div>
  <div class="row"><span class="label">最近上报</span><span class="value" id="lastFlush">-</span></div>
  <div class="row"><span class="label">最近结果</span><span class="value" id="lastResult">-</span></div>
  <div class="row"><span class="label">聚水潭本次采集</span><span class="value" id="jstOnce">未开启</span></div>

  <button id="jstOnceBtn" class="primary">开始本次聚水潭采集（10 分钟）</button>
  <button id="flushBtn">立即上报</button>
  <button id="optBtn">打开设置</button>
  <div class="hint">聚水潭不会长期采集。只有点“开始本次聚水潭采集”或使用带采集标记的链接打开页面后，10 分钟窗口内的数据才会入队。</div>
  <div class="footer"><a id="reload">重新读取状态</a></div>
  <script src="popup.js"></script>
</body>
</html>
