<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Temu 多店监控</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card: rgba(255,255,255,0.82);
      --text-1: #1d1d1f;
      --text-2: #86868b;
      --text-3: #aeaeb2;
      --accent: #0071e3;
      --green: #34c759;
      --yellow: #ff9f0a;
      --red: #ff3b30;
      --sep: rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px; background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", system-ui, sans-serif;
      font-size: 13px; color: var(--text-1); -webkit-font-smoothing: antialiased;
    }
    .top { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px 12px; }
    .top h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .pill { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; background: var(--green); color: #fff; }
    .pill.off { background: var(--red); }
    .card { background: var(--card); border-radius: 12px; margin: 0 14px 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); overflow: hidden; }
    .row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 0.5px solid var(--sep); }
    .row:last-child { border-bottom: none; }
    .row .l { color: var(--text-2); font-size: 12px; }
    .row .r { font-size: 12px; font-variant-numeric: tabular-nums; }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .dot-g { background: var(--green); } .dot-y { background: var(--yellow); } .dot-r { background: var(--red); } .dot-x { background: var(--text-3); }
    .tasks-summary { cursor: pointer; user-select: none; }
    .tasks-summary .arrow { transition: transform 0.2s; display: inline-block; font-size: 10px; margin-left: 4px; color: var(--text-3); }
    .tasks-summary.open .arrow { transform: rotate(90deg); }
    .tasks-detail { display: none; padding: 4px 14px 8px; font-size: 11px; color: var(--text-2); line-height: 1.8; }
    .tasks-detail.show { display: block; }
    .tag { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 5px; background: rgba(0,113,227,0.08); color: var(--accent); }
    .btns { display: flex; gap: 8px; padding: 2px 14px 14px; }
    .btn { flex: 1; padding: 9px; border: none; border-radius: 9px; font-size: 12px; font-weight: 500; cursor: pointer; transition: transform 0.15s; text-align: center; }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.4; }
    .btn-a { background: var(--accent); color: #fff; }
    .btn-b { background: rgba(0,0,0,0.04); color: var(--text-1); }
    .foot { text-align: center; padding: 0 0 12px; font-size: 10px; color: var(--text-3); }
    .foot a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="top">
    <h1>多店监控</h1>
    <span class="pill" id="pill">已连接</span>
  </div>

  <div class="card">
    <div class="row"><span class="l">已捕获</span><span class="r" id="captured">—</span></div>
    <div class="row"><span class="l">已上报 / 队列</span><span class="r"><span id="sent">—</span> / <span id="queue">—</span></span></div>
    <div class="row"><span class="l">最近同步</span><span class="r" id="lastFlush">—</span></div>
    <div class="row tasks-summary" id="taskToggle"><span class="l">采集任务</span><span class="r" id="taskSummary">—<span class="arrow">›</span></span></div>
    <div class="tasks-detail" id="taskDetail"></div>
  </div>

  <div class="card">
    <div class="row tasks-summary" id="mallToggle"><span class="l">店铺</span><span class="r"><span id="mallCount">0</span><span class="arrow">›</span></span></div>
    <div class="tasks-detail" id="mallDetail"></div>
  </div>

  <div class="btns">
    <button class="btn btn-a" id="flushBtn">同步</button>
    <button class="btn btn-b" id="collectBtn">采集</button>
    <button class="btn btn-b" id="flowBackfillBtn">三区回填</button>
    <button class="btn btn-b" id="optBtn">设置</button>
  </div>
  <div class="foot"><a id="reload">刷新</a> · <span id="ver"></span></div>

  <script src="popup.js"></script>
</body>
</html>
