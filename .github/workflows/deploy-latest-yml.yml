name: Deploy latest.yml

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download latest release metadata
        run: |
          set -euo pipefail
          curl -fsSL \
            https://github.com/9619221/temu-automation/releases/latest/download/latest.yml \
            -o latest.yml
          grep -q '^version: 0\.3\.32$' latest.yml

      - name: Upload latest.yml to update server
        env:
          SSH_KEY: ${{ secrets.TEMU_ERP_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/temu_erp_key
          chmod 600 ~/.ssh/temu_erp_key
          scp -o StrictHostKeyChecking=no -i ~/.ssh/temu_erp_key \
            latest.yml ubuntu@43.161.214.204:/tmp/temu-latest.yml
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/temu_erp_key ubuntu@43.161.214.204 \
            'set -euo pipefail; install -m 0644 /tmp/temu-latest.yml /opt/temu-updates/releases/latest.yml; rm -f /tmp/temu-latest.yml; head -5 /opt/temu-updates/releases/latest.yml'
